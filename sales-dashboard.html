<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LIFT 売上ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:       #08061A;
  --bg2:      #0F0A2A;
  --bg3:      #160E38;
  --surface:  rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.09);
  --border:   rgba(139,92,246,0.18);
  --border2:  rgba(255,255,255,0.08);
  --accent:   #8B5CF6;
  --accent2:  #6D28D9;
  --accentL:  rgba(139,92,246,0.15);
  --rose:     #EC4899;
  --good:     #10B981;
  --goodL:    rgba(16,185,129,0.12);
  --warn:     #F59E0B;
  --warnL:    rgba(245,158,11,0.12);
  --bad:      #EF4444;
  --badL:     rgba(239,68,68,0.12);
  --text:     #F1EEF8;
  --text2:    #9B8FBB;
  --text3:    #5C527A;
  --gold:     #F9A825;
  --r:        12px;
  --rs:       8px;
  --sh:       0 4px 24px rgba(0,0,0,0.35);
  --sh2:      0 2px 12px rgba(0,0,0,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ====== スクロールバー ====== */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 4px; }

/* ====== LOADER ====== */
#loader {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  transition: opacity .6s;
}
#loader.out { opacity: 0; pointer-events: none; }
.ld-logo {
  width: 72px; height: 72px; border-radius: 20px;
  background: linear-gradient(135deg, #8B5CF6, #EC4899);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px; font-weight: 600; color: #fff;
  box-shadow: 0 0 40px rgba(139,92,246,.5);
  animation: ldpulse 1.5s ease-in-out infinite;
}
@keyframes ldpulse {
  0%,100%{box-shadow:0 0 30px rgba(139,92,246,.4);}
  50%{box-shadow:0 0 60px rgba(139,92,246,.7);}
}
.ld-dots { display: flex; gap: 8px; }
.ld-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); opacity: .3;
  animation: lddot 1.2s ease-in-out infinite;
}
.ld-dot:nth-child(2){animation-delay:.15s;}
.ld-dot:nth-child(3){animation-delay:.3s;}
@keyframes lddot {
  0%,100%{opacity:.3;transform:scale(1);}
  50%{opacity:1;transform:scale(1.4);}
}
.ld-txt { font-size: 13px; color: var(--text2); letter-spacing: .5px; }

/* ====== 背景グロー ====== */
#bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.glow-orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: .25;
}
.orb1 { width: 600px; height: 600px; background: #6D28D9; top: -200px; left: -200px; }
.orb2 { width: 500px; height: 500px; background: #1E40AF; top: 30%; right: -200px; }
.orb3 { width: 400px; height: 400px; background: #7C3AED; bottom: -150px; left: 30%; }

/* ====== メインコンテナ ====== */
#app {
  position: relative; z-index: 1;
  max-width: 1180px; margin: 0 auto;
  padding: 0 20px 60px;
  opacity: 0; transition: opacity .5s;
}
#app.ready { opacity: 1; }

/* ====== ヘッダー ====== */
#hd {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.hd-logo {
  width: 46px; height: 46px; border-radius: 13px;
  background: linear-gradient(135deg, #8B5CF6, #EC4899);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 600; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(139,92,246,.4);
}
.hd-info { flex: 1; min-width: 0; }
.hd-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600; color: var(--text);
  letter-spacing: .3px;
}
.hd-sub { font-size: 11px; color: var(--text2); margin-top: 2px; letter-spacing: .5px; }
.hd-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.chip {
  padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
  letter-spacing: .4px; white-space: nowrap;
}
.chip-month { background: var(--accentL); color: var(--accent); border: 1px solid var(--border); }
.chip-day   { background: rgba(16,185,129,.12); color: var(--good); border: 1px solid rgba(16,185,129,.2); }
.chip-pct   { background: rgba(245,158,11,.12); color: var(--warn); border: 1px solid rgba(245,158,11,.2); }
#refBtn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
#refBtn:hover { background: var(--accentL); color: var(--accent); }
#refBtn.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ====== エラーバナー ====== */
#errBanner {
  display: none; margin-bottom: 20px;
  padding: 14px 18px; border-radius: var(--r);
  background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
  font-size: 13px; color: #FCA5A5;
}
#errBanner.show { display: block; }

/* ====== KPIカード セクション ====== */
.sec-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: var(--text3); text-transform: uppercase;
  margin-bottom: 14px;
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 18px 20px;
  position: relative; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  backdrop-filter: blur(12px);
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--sh); }
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--rose));
  opacity: 0.6;
}
.kpi-card.good::before { background: linear-gradient(90deg, var(--good), #34D399); opacity: 1; }
.kpi-card.warn::before { background: linear-gradient(90deg, var(--warn), #FBBF24); opacity: 1; }
.kpi-card.bad::before  { background: linear-gradient(90deg, var(--bad),  #F87171); opacity: 1; }
.kpi-lbl { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.kpi-val {
  font-size: 24px; font-weight: 700; color: var(--text);
  font-variant-numeric: tabular-nums; line-height: 1;
}
.kpi-val.huge { font-size: 36px; }
.kpi-val.good { color: var(--good); }
.kpi-val.warn { color: var(--warn); }
.kpi-val.bad  { color: var(--bad); }
.kpi-sub { font-size: 11px; color: var(--text2); margin-top: 6px; }
.kpi-icon { font-size: 22px; position: absolute; top: 16px; right: 18px; opacity: .4; }

/* ====== プログレスバー ====== */
.progress-section {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 20px 24px;
  margin-bottom: 24px;
  backdrop-filter: blur(12px);
}
.prog-row { margin-bottom: 14px; }
.prog-row:last-child { margin-bottom: 0; }
.prog-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.prog-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.prog-pct   { font-size: 13px; font-weight: 700; color: var(--text); }
.prog-track {
  height: 10px; background: rgba(255,255,255,.06);
  border-radius: 10px; overflow: hidden; position: relative;
}
.prog-fill {
  height: 100%; border-radius: 10px;
  transition: width 1.2s cubic-bezier(.34,1.1,.64,1);
  position: relative; overflow: hidden;
}
.prog-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.25) 50%, transparent 100%);
  animation: shimmer 2s ease-in-out infinite;
}
@keyframes shimmer {
  0%{transform:translateX(-100%);}100%{transform:translateX(100%);}
}
.prog-fill.good { background: linear-gradient(90deg, #059669, #10B981); }
.prog-fill.warn { background: linear-gradient(90deg, #D97706, #F59E0B); }
.prog-fill.bad  { background: linear-gradient(90deg, #DC2626, #EF4444); }
.prog-fill.ref  { background: linear-gradient(90deg, #4338CA, #7C3AED); }
.prog-ref-line {
  position: absolute; top: 0; height: 100%; width: 2px;
  background: rgba(255,255,255,.4); border-radius: 1px;
}
.status-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
  margin-top: 12px;
}
.status-chip.good { background: var(--goodL); color: var(--good); border: 1px solid rgba(16,185,129,.25); }
.status-chip.warn { background: var(--warnL); color: var(--warn); border: 1px solid rgba(245,158,11,.25); }
.status-chip.bad  { background: var(--badL);  color: var(--bad);  border: 1px solid rgba(239,68,68,.25); }

/* ====== 2カラム レイアウト ====== */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
@media(max-width:700px) { .two-col { grid-template-columns: 1fr; } }

/* ====== チャートカード ====== */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 20px;
  backdrop-filter: blur(12px);
}
.chart-title {
  font-size: 12px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 16px;
}
.chart-wrap { position: relative; }

/* ====== SVランキング ====== */
#sv-rank-section { margin-bottom: 24px; }
.sv-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.sv-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
  position: relative; overflow: hidden;
  backdrop-filter: blur(12px);
}
.sv-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
.sv-card.active {
  border-color: var(--accent);
  background: var(--accentL);
  box-shadow: 0 0 0 1px var(--accent), var(--sh);
}
.sv-card-rank {
  position: absolute; top: 12px; right: 14px;
  font-size: 18px; line-height: 1;
}
.sv-card-name {
  font-size: 15px; font-weight: 700; color: var(--text);
  margin-bottom: 4px;
  padding-right: 28px;
}
.sv-card-stores {
  font-size: 10px; color: var(--text3);
  margin-bottom: 12px; letter-spacing: .5px;
}
.sv-card-ach {
  font-size: 28px; font-weight: 800;
  line-height: 1; margin-bottom: 6px;
}
.sv-card-ach.good { color: var(--good); }
.sv-card-ach.warn { color: var(--warn); }
.sv-card-ach.bad  { color: var(--bad); }
.sv-card-bar-track {
  height: 4px; background: rgba(255,255,255,.06);
  border-radius: 4px; overflow: hidden;
}
.sv-card-bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 1.2s cubic-bezier(.34,1.1,.64,1);
}
.sv-card-bar-fill.good { background: linear-gradient(90deg, #059669, #10B981); }
.sv-card-bar-fill.warn { background: linear-gradient(90deg, #D97706, #F59E0B); }
.sv-card-bar-fill.bad  { background: linear-gradient(90deg, #DC2626, #EF4444); }
.sv-card-sales { font-size: 11px; color: var(--text2); margin-top: 8px; }

/* ====== SV詳細セクション ====== */
#detail-section { margin-bottom: 24px; }
.detail-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.detail-sv-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 600; color: var(--text);
}
.detail-badge {
  padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.badge-direct    { background: rgba(99,102,241,.15); color: #818CF8; border: 1px solid rgba(99,102,241,.25); }
.badge-franchise { background: rgba(245,158,11,.12); color: var(--warn); border: 1px solid rgba(245,158,11,.25); }
.badge-mixed     { background: var(--accentL); color: var(--accent); border: 1px solid var(--border); }
.detail-kpis {
  display: flex; gap: 20px; flex-wrap: wrap;
}
.detail-kpi { text-align: right; }
.detail-kpi-val { font-size: 18px; font-weight: 700; color: var(--text); }
.detail-kpi-lbl { font-size: 10px; color: var(--text3); margin-top: 1px; letter-spacing: .5px; }

/* ====== 店舗テーブル ====== */
.store-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  overflow: hidden;
  backdrop-filter: blur(12px);
}
.store-table { width: 100%; border-collapse: collapse; }
.store-table th {
  padding: 10px 14px;
  font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3);
  background: rgba(0,0,0,.3);
  text-align: left; white-space: nowrap;
  border-bottom: 1px solid var(--border2);
}
.store-table th.r { text-align: right; }
.store-table td {
  padding: 12px 14px; font-size: 13px; color: var(--text);
  border-bottom: 1px solid rgba(255,255,255,.04);
  vertical-align: middle;
}
.store-table tr:last-child td { border-bottom: none; }
.store-table tr { transition: background .15s; }
.store-table tr:hover td { background: rgba(255,255,255,.03); }

.td-rank { font-size: 11px; color: var(--text3); font-weight: 600; width: 32px; }
.td-rank.g1 { color: var(--gold); font-size: 16px; }
.td-rank.g2 { color: #9CA3AF; font-size: 15px; }
.td-rank.g3 { color: #92400E; font-size: 15px; }

.td-store { font-weight: 600; }
.td-store .store-sub { font-size: 10px; color: var(--text3); font-weight: 400; margin-top: 2px; }

.type-badge {
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 6px; letter-spacing: .5px; white-space: nowrap;
}
.type-direct    { background: rgba(99,102,241,.15); color: #A5B4FC; }
.type-franchise { background: rgba(245,158,11,.12); color: #FCD34D; }

.td-num { text-align: right; font-variant-numeric: tabular-nums; }
.td-num.target { color: var(--text2); font-size: 12px; }
.td-num.actual { font-weight: 700; }

.ach-pill {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 52px; padding: 4px 10px; border-radius: 8px;
  font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
}
.ach-pill.good { background: var(--goodL); color: var(--good); }
.ach-pill.warn { background: var(--warnL); color: var(--warn); }
.ach-pill.bad  { background: var(--badL);  color: var(--bad);  }

.mini-bar-track { height: 4px; width: 80px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden; display: inline-block; vertical-align: middle; }
.mini-bar-fill { height: 100%; border-radius: 4px; }
.mini-bar-fill.good { background: var(--good); }
.mini-bar-fill.warn { background: var(--warn); }
.mini-bar-fill.bad  { background: var(--bad); }

.landing-val { font-size: 12px; color: var(--text2); }

/* ====== アラートセクション ====== */
#alert-section { margin-bottom: 24px; }
.alert-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media(max-width:600px) { .alert-grid { grid-template-columns: 1fr; } }
.alert-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 18px;
  backdrop-filter: blur(12px);
}
.alert-box.danger { border-color: rgba(239,68,68,.2); background: rgba(239,68,68,.04); }
.alert-box.success{ border-color: rgba(16,185,129,.2); background: rgba(16,185,129,.04); }
.alert-hd { font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-bottom: 12px; }
.alert-hd.danger  { color: var(--bad);  }
.alert-hd.success { color: var(--good); }
.alert-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.04);
  font-size: 12px; gap: 8px;
}
.alert-item:last-child { border-bottom: none; }
.alert-store { color: var(--text); font-weight: 500; flex: 1; min-width: 0; }
.alert-store small { display: block; color: var(--text3); font-size: 10px; font-weight: 400; }
.alert-pct { font-weight: 700; white-space: nowrap; }
.alert-pct.danger  { color: var(--bad); }
.alert-pct.success { color: var(--good); }

/* ====== 全店一覧 ====== */
#all-section { margin-bottom: 24px; }
.sec-toggle {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; cursor: pointer; user-select: none;
}
.sec-toggle-btn {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; padding: 4px 12px;
  font-size: 11px; color: var(--text2); cursor: pointer;
  transition: all .2s;
}
.sec-toggle-btn:hover { background: var(--accentL); color: var(--accent); }

/* ====== 検索 ====== */
.search-wrap { margin-bottom: 14px; position: relative; }
.search-input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--rs); color: var(--text); font-size: 13px;
  outline: none; transition: border-color .2s;
}
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 14px; pointer-events: none;
}

/* ====== フッター ====== */
#footer {
  text-align: center; padding: 24px 0 10px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text3); letter-spacing: .5px;
}
#footer span { color: var(--text2); }

/* ====== アニメーション ====== */
.fade-in {
  opacity: 0; transform: translateY(16px);
  animation: fadeIn .5s ease forwards;
}
@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}
.fade-in:nth-child(1){animation-delay:.05s;}
.fade-in:nth-child(2){animation-delay:.1s;}
.fade-in:nth-child(3){animation-delay:.15s;}
.fade-in:nth-child(4){animation-delay:.2s;}
.fade-in:nth-child(5){animation-delay:.25s;}
.fade-in:nth-child(6){animation-delay:.3s;}

/* ====== レスポンシブ ====== */
@media(max-width:760px) {
  #app { padding: 0 14px 50px; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .sv-cards  { grid-template-columns: 1fr 1fr; }
  .kpi-val.huge { font-size: 26px; }
  .store-table { font-size: 12px; }
  .store-table th, .store-table td { padding: 10px 10px; }
  .mini-bar-track { width: 56px; }
}
@media(max-width:480px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .sv-cards  { grid-template-columns: 1fr; }
}

/* ====== ユーティリティ ====== */
.hide { display: none !important; }
.mb8 { margin-bottom: 8px; }
.mb16{ margin-bottom: 16px; }
.mb24{ margin-bottom: 24px; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="ld-logo">L</div>
  <div class="ld-dots">
    <div class="ld-dot"></div>
    <div class="ld-dot"></div>
    <div class="ld-dot"></div>
  </div>
  <div class="ld-txt">売上データを読み込んでいます...</div>
</div>

<!-- 背景グロー -->
<div id="bg-glow">
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>
  <div class="glow-orb orb3"></div>
</div>

<div id="app">

  <!-- ヘッダー -->

              <th>#</th>
              <th>SV</th>
              <th>店舗名</th>
              <th>種別</th>
              <th class="r">目標</th>
              <th class="r">実績</th>

</div><!-- /app -->

<script>
// ====== 設定 ======
var SHEET_ID = '1AmYsEvyKvpAF4HokThApp21V1IyMvzC0_2ksafwDdIw';
var GID      = 729022823;

// 列マッピング (0-indexed, GVIZ output)
var COL = {
  sv:      0,   // A: SV名
  type:    1,   // B: 直or加
  store:   2,   // C: 店舗名
  maxBooth:3,   // D: MAXブース
  staff:   4,   // E: スタッフ数
  royalty: 5,   // F: ロイヤリティ率
  target:  6,   // G: 月間目標
  actual:  7,   // H: 実績
  achRate: 8,   // I: 達成率 (decimal)
  landing: 9,   // J: 着地見込
};
// Metadata row (row index 0): col6=elapsedDays, col8=totalDays, col10=elapsedRatio, col11=yyyymm
var META_COL = {
  elapsed: 6,
  total:   8,
  ratio:   10,
  yyyymm:  11,
};

// ====== グローバル状態 ======
var _allStores  = [];
var _svGroups   = [];
var _meta       = {};
var _charts     = {};
var _currentSV  = null;
var _allExpanded= false;

// ====== ユーティリティ ======
function fmtYen(v) {
  var n = Math.round(Number(v) || 0);
  if (n >= 100000000) return '¥' + (n / 100000000).toFixed(1) + '億';
  if (n >= 10000)     return '¥' + Math.round(n / 10000) + '万';
  return '¥' + n.toLocaleString();
}
function fmtYenFull(v) {
  return '¥' + Math.round(Number(v) || 0).toLocaleString();
}
function fmtPct(v) {
  return Math.round(Number(v) * (v <= 1.0 && v >= 0 ? 100 : 1)) + '%';
}
function achPct(v) {
  // v is decimal (0.26) or percentage (26) - normalize to integer %
  var n = Number(v) || 0;
  if (n > 0 && n <= 1.5) return Math.round(n * 100);
  return Math.round(n);
}
function achClass(pct) {
  if (pct >= 100) return 'good';
  if (pct >= 60)  return 'warn';
  return 'bad';
}
function rankIcon(i) {
  if (i === 0) return '🥇';
  if (i === 1) return '🥈';
  if (i === 2) return '🥉';
  return (i + 1) + '';
}

// ====== GVIZ JSONP ======
function fetchGviz() {
  return new Promise(function(resolve, reject) {
    var cb  = '_gviz_' + Date.now();
    var s   = document.createElement('script');
    var tid = setTimeout(function() {
      s.remove(); delete window[cb];
      reject(new Error('タイムアウト (30秒)'));
    }, 30000);
    window[cb] = function(resp) {
      clearTimeout(tid); s.remove(); delete window[cb];
      if (!resp || !resp.table) { reject(new Error('データなし')); return; }
      resolve(resp.table);
    };
    s.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID
          + '/gviz/tq?tqx=out:json;responseHandler:' + cb
          + '&gid=' + GID + '&headers=0';
    s.onerror = function() {
      clearTimeout(tid); s.remove(); delete window[cb];
      reject(new Error('ネットワークエラー'));
    };
    document.head.appendChild(s);
  });
}

function tableToRows(table) {
  if (!table || !table.rows) return [];
  return table.rows.map(function(row) {
    return (row.c || []).map(function(cell) {
      if (!cell) return null;
      if (cell.v !== undefined && cell.v !== null) return cell.v;
      return null;
    });
  });
}

// ====== データ解析 ======
function parseMeta(rows) {
  var row0 = rows[0] || [];
  var meta = {};
  meta.elapsedDays = Number(row0[META_COL.elapsed]) || new Date().getDate();
  meta.totalDays   = Number(row0[META_COL.total])   || 30;
  meta.elapsedRatio= Number(row0[META_COL.ratio])   || (meta.elapsedDays / meta.totalDays);
  var ym = row0[META_COL.yyyymm];
  if (ym) {
    var ymStr = String(Math.round(ym));
    meta.year  = parseInt(ymStr.slice(0, 4));
    meta.month = parseInt(ymStr.slice(4, 6));
  } else {
    var now = new Date();
    meta.year  = now.getFullYear();
    meta.month = now.getMonth() + 1;
  }
  meta.elapsedPct = Math.round(meta.elapsedRatio * 100);
  return meta;
}

function parseStores(rows) {
  var stores = [];
  var lastSV = '';
  // Skip rows 0-4 (metadata + headers)
  for (var r = 5; r < rows.length; r++) {
    var row = rows[r];
    if (!row) continue;
    var sv    = String(row[COL.sv]    || '').trim();
    var type  = String(row[COL.type]  || '').trim();
    var store = String(row[COL.store] || '').trim();
    if (sv) lastSV = sv;
    else sv = lastSV;
    if (!store || !sv) continue;
    // Skip separator/subtotal rows (no valid target)
    var target  = Number(row[COL.target])  || 0;
    var actual  = Number(row[COL.actual])  || 0;
    var achRaw  = row[COL.achRate];
    var landing = Number(row[COL.landing]) || 0;
    var achP;
    if (achRaw !== null && achRaw !== undefined) {
      achP = achPct(achRaw);
    } else if (target > 0) {
      achP = Math.round(actual / target * 100);
    } else {
      achP = 0;
    }
    stores.push({
      sv: sv, type: type, store: store,
      target: target, actual: actual,
      achP: achP, landing: landing,
      isDirect: type.indexOf('直') !== -1,
    });
  }
  return stores;
}

function groupBySV(stores) {
  var map = {}, order = [];
  stores.forEach(function(s) {
    if (!map[s.sv]) {
      map[s.sv] = { sv: s.sv, stores: [], totTarget: 0, totActual: 0, totLanding: 0 };
      order.push(s.sv);
    }
    map[s.sv].stores.push(s);
    map[s.sv].totTarget  += s.target;
    map[s.sv].totActual  += s.actual;
    map[s.sv].totLanding += s.landing;
  });
  return order.map(function(sv) {
    var g = map[sv];
    g.achP  = g.totTarget > 0 ? Math.round(g.totActual / g.totTarget * 100) : 0;
    g.count = g.stores.length;
    g.directCount    = g.stores.filter(function(s) { return s.isDirect; }).length;
    g.franchiseCount = g.count - g.directCount;
    return g;
  });
}

// ====== メイン読み込み ======
async function loadData() {
  document.getElementById('refBtn').classList.add('spin');
  document.getElementById('errBanner').classList.remove('show');
  try {
    var table  = await fetchGviz();
    var rows   = tableToRows(table);
    _meta      = parseMeta(rows);
    _allStores = parseStores(rows);
    _svGroups  = groupBySV(_allStores);
    if (_allStores.length === 0) throw new Error('店舗データが見つかりません。シートの共有設定を確認してください。');
    renderAll();
    document.getElementById('updTime').textContent =
      new Date().toLocaleString('ja-JP', {hour:'2-digit', minute:'2-digit', month:'short', day:'numeric'});
    document.getElementById('loader').classList.add('out');
    document.getElementById('app').classList.add('ready');
  } catch(e) {
    document.getElementById('errBanner').classList.add('show');
    document.getElementById('errMsg').textContent = e.message;
    document.getElementById('loader').classList.add('out');
    document.getElementById('app').classList.add('ready');
  } finally {
    document.getElementById('refBtn').classList.remove('spin');
  }
}

function reload() { loadData(); }

// ====== 全描画 ======
function renderAll() {
  renderHeader();
  renderKPI();
  renderProgress();
  renderCharts();
  renderSVCards();
  renderAlerts();
  renderAllStores();
}

// ====== ヘッダー ======
function renderHeader() {
  var m = _meta;
  document.getElementById('hdSub').textContent = '売上管理データ | ' + m.year + '年' + m.month + '月';
  document.getElementById('chipMonth').textContent = m.year + '年' + m.month + '月';
  document.getElementById('chipDay').textContent   = m.elapsedDays + '/' + m.totalDays + '日';
  document.getElementById('chipPct').textContent   = '経過 ' + m.elapsedPct + '%';
}

// ====== KPIグリッド ======
function renderKPI() {
  var totTarget  = _allStores.reduce(function(s, x) { return s + x.target; }, 0);
  var totActual  = _allStores.reduce(function(s, x) { return s + x.actual; }, 0);
  var totLanding = _allStores.reduce(function(s, x) { return s + x.landing; }, 0);
  var totAch     = totTarget > 0 ? Math.round(totActual / totTarget * 100) : 0;
  var cls        = achClass(totAch);
  var achCnt     = _allStores.filter(function(s) { return s.achP >= 100; }).length;
  var pace       = totAch >= _meta.elapsedPct ? '▲ ペース良好' : '▼ 要挽回';
  var directCnt  = _allStores.filter(function(s) { return s.isDirect; }).length;

  var kpis = [
    { lbl:'合計目標', val: fmtYenFull(totTarget),  sub:'月間売上目標',        icon:'🎯', cls:'' },
    { lbl:'合計実績', val: fmtYenFull(totActual),  sub:'現時点の売上合計',    icon:'💰', cls:'' },
    { lbl:'達成率',   val: totAch + '%',            sub:pace,                  icon:'📊', cls: cls, huge: true },
    { lbl:'着地見込', val: fmtYenFull(totLanding),  sub:'月末着地予測',       icon:'📈', cls:'' },
    { lbl:'目標達成', val: achCnt + '/' + _allStores.length, sub:'店舗が100%達成', icon:'✅', cls: achCnt > 0 ? 'good' : 'bad' },
    { lbl:'担当店舗', val: _allStores.length + '店', sub:'直営' + directCnt + '・加盟' + (_allStores.length - directCnt), icon:'🏪', cls:'' },
  ];

  document.getElementById('kpiGrid').innerHTML = kpis.map(function(k) {
    return '<div class="kpi-card fade-in ' + k.cls + '">'
      + '<div class="kpi-icon">' + k.icon + '</div>'
      + '<div class="kpi-lbl">' + k.lbl + '</div>'
      + '<div class="kpi-val ' + (k.huge ? 'huge ' : '') + k.cls + '" data-target="' + k.val + '">' + k.val + '</div>'
      + '<div class="kpi-sub">' + k.sub + '</div>'
      + '</div>';
  }).join('');
}

// ====== プログレスバー ======
function renderProgress() {
  var totTarget = _allStores.reduce(function(s, x) { return s + x.target; }, 0);
  var totActual = _allStores.reduce(function(s, x) { return s + x.actual; }, 0);
  var totAch    = totTarget > 0 ? Math.round(totActual / totTarget * 100) : 0;
  var ePct      = _meta.elapsedPct;
  var cls       = achClass(totAch);
  var fillW     = Math.min(totAch, 120); // allow over 100%

  var statusMsg = totAch >= 100 ? '🎉 目標達成！素晴らしいペースです'
    : totAch >= ePct ? '▲ 良好なペース。このまま維持しましょう'
    : totAch >= ePct * 0.8 ? '▶ やや遅れ気味。後半の巻き返しが重要です'
    : '⚠️ 大幅に遅れています。緊急の対策が必要です';
  var statusCls = totAch >= ePct ? 'good' : totAch >= ePct * 0.8 ? 'warn' : 'bad';

  // 直営/加盟 内訳
  var directStores    = _allStores.filter(function(s) { return s.isDirect; });
  var franchiseStores = _allStores.filter(function(s) { return !s.isDirect; });
  var dirAch  = directStores.length > 0
    ? Math.round(directStores.reduce(function(s,x){return s+x.actual;},0) / Math.max(directStores.reduce(function(s,x){return s+x.target;},0), 1) * 100) : 0;
  var franAch = franchiseStores.length > 0
    ? Math.round(franchiseStores.reduce(function(s,x){return s+x.actual;},0) / Math.max(franchiseStores.reduce(function(s,x){return s+x.target;},0), 1) * 100) : 0;

  document.getElementById('progSection').innerHTML =
    '<div class="prog-row">'
    + '<div class="prog-header"><span class="prog-label">🏆 全体達成率</span><span class="prog-pct" style="color:var(--' + (cls === 'good' ? 'good' : cls === 'warn' ? 'warn' : 'bad') + ')">' + totAch + '%</span></div>'
    + '<div class="prog-track"><div class="prog-fill ' + cls + '" style="width:0%" data-w="' + Math.min(fillW, 100) + '"></div></div>'
    + '</div>'
    + '<div class="prog-row">'
    + '<div class="prog-header"><span class="prog-label">⏱ 月次経過率</span><span class="prog-pct">' + ePct + '%</span></div>'
    + '<div class="prog-track"><div class="prog-fill ref" style="width:0%" data-w="' + ePct + '"></div></div>'
    + '</div>'
    + '<div class="prog-row">'
    + '<div class="prog-header"><span class="prog-label">🏢 直営 達成率</span><span class="prog-pct" style="color:var(--' + achClass(dirAch).replace('good','good').replace('warn','warn').replace('bad','bad') + ')">' + dirAch + '%</span></div>'
    + '<div class="prog-track"><div class="prog-fill ' + achClass(dirAch) + '" style="width:0%" data-w="' + Math.min(dirAch, 100) + '"></div></div>'
    + '</div>'
    + '<div class="prog-row">'
    + '<div class="prog-header"><span class="prog-label">🤝 加盟 達成率</span><span class="prog-pct" style="color:var(--' + achClass(franAch).replace('good','good') + ')">' + franAch + '%</span></div>'
    + '<div class="prog-track"><div class="prog-fill ' + achClass(franAch) + '" style="width:0%" data-w="' + Math.min(franAch, 100) + '"></div></div>'
    + '</div>'
    + '<span class="status-chip ' + statusCls + '">' + statusMsg + '</span>';

  // アニメーション
  setTimeout(function() {
    document.querySelectorAll('.prog-fill').forEach(function(el) {
      el.style.width = (el.dataset.w || 0) + '%';
    });
  }, 100);
}

// ====== チャート ======
function renderCharts() {
  var sorted = _svGroups.slice().sort(function(a, b) { return b.achP - a.achP; });
  var labels  = sorted.map(function(g) { return g.sv; });
  var achData = sorted.map(function(g) { return g.achP; });
  var colors  = sorted.map(function(g) {
    var p = g.achP;
    return p >= 100 ? 'rgba(16,185,129,.80)'
         : p >= 60  ? 'rgba(245,158,11,.80)'
         : 'rgba(239,68,68,.80)';
  });
  var borderColors = sorted.map(function(g) {
    var p = g.achP;
    return p >= 100 ? '#10B981' : p >= 60 ? '#F59E0B' : '#EF4444';
  });

  // Chart defaults
  Chart.defaults.color = '#9B8FBB';
  Chart.defaults.font.family = "'Inter', sans-serif";

  // SV達成率チャート
  if (_charts.ach) _charts.ach.destroy();
  _charts.ach = new Chart(document.getElementById('svAchChart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '達成率',
        data: achData,
        backgroundColor: colors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) { return ' ' + ctx.parsed.x + '% 達成'; }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,.05)' },
          ticks: { callback: function(v) { return v + '%'; }, font: { size: 10 } },
          max: Math.max(120, Math.max.apply(null, achData) + 10),
        },
        y: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });

  // SV売上比較（目標vs実績）
  if (_charts.sales) _charts.sales.destroy();
  var salesSorted = _svGroups.slice().sort(function(a, b) { return b.totTarget - a.totTarget; });
  var salesLabels = salesSorted.map(function(g) { return g.sv; });

  _charts.sales = new Chart(document.getElementById('svSalesChart'), {
    type: 'bar',
    data: {
      labels: salesLabels,
      datasets: [
        {
          label: '目標',
          data: salesSorted.map(function(g) { return g.totTarget; }),
          backgroundColor: 'rgba(139,92,246,.25)',
          borderColor: '#8B5CF6',
          borderWidth: 1,
          borderRadius: 4,
          borderSkipped: false,
        },
        {
          label: '実績',
          data: salesSorted.map(function(g) { return g.totActual; }),
          backgroundColor: salesSorted.map(function(g) {
            return g.achP >= 100 ? 'rgba(16,185,129,.70)'
                 : g.achP >= 60  ? 'rgba(245,158,11,.70)'
                 : 'rgba(239,68,68,.70)';
          }),
          borderColor: salesSorted.map(function(g) {
            return g.achP >= 100 ? '#10B981' : g.achP >= 60 ? '#F59E0B' : '#EF4444';
          }),
          borderWidth: 1,
          borderRadius: 4,
          borderSkipped: false,
        }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          labels: { font: { size: 10 }, padding: 12, boxWidth: 12 }
        },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              return ' ' + ctx.dataset.label + ': ¥' + Math.round(ctx.parsed.x).toLocaleString();
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,.05)' },
          ticks: {
            callback: function(v) { return v >= 1000000 ? '¥' + Math.round(v/10000) + '万' : v; },
            font: { size: 10 }
          }
        },
        y: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  });
}

// ====== SVカード ======
function renderSVCards() {
  var sorted = _svGroups.slice().sort(function(a, b) { return b.achP - a.achP; });
  document.getElementById('svCards').innerHTML = sorted.map(function(g, i) {
    var cls = achClass(g.achP);
    var typeLabel = g.directCount > 0 && g.franchiseCount > 0 ? '直営+加盟'
                  : g.directCount > 0 ? '直営のみ' : '加盟のみ';
    return '<div class="sv-card fade-in" onclick="showSVDetail(\'' + g.sv + '\')" id="svcard-' + g.sv + '">'
      + '<div class="sv-card-rank">' + rankIcon(i) + '</div>'
      + '<div class="sv-card-name">' + g.sv + '</div>'
      + '<div class="sv-card-stores">' + typeLabel + ' ／ ' + g.count + '店舗</div>'
      + '<div class="sv-card-ach ' + cls + '">' + g.achP + '%</div>'
      + '<div class="sv-card-bar-track"><div class="sv-card-bar-fill ' + cls + '" style="width:0%" data-w="' + Math.min(g.achP, 100) + '"></div></div>'
      + '<div class="sv-card-sales">' + fmtYenFull(g.totActual) + ' / ' + fmtYenFull(g.totTarget) + '</div>'
      + '</div>';
  }).join('');

  setTimeout(function() {
    document.querySelectorAll('.sv-card-bar-fill').forEach(function(el) {
      el.style.width = (el.dataset.w || 0) + '%';
    });
  }, 200);
}

// ====== SV詳細表示 ======
function showSVDetail(svName) {
  _currentSV = svName;

  // カードのアクティブ状態
  document.querySelectorAll('.sv-card').forEach(function(el) {
    el.classList.toggle('active', el.id === 'svcard-' + svName);
  });

  var g = _svGroups.filter(function(x) { return x.sv === svName; })[0];
  if (!g) return;

  document.getElementById('detailName').textContent = g.sv;

  var badgeCls = g.directCount > 0 && g.franchiseCount > 0 ? 'badge-mixed'
               : g.directCount > 0 ? 'badge-direct' : 'badge-franchise';
  var badgeTxt = g.directCount > 0 && g.franchiseCount > 0
    ? '直営' + g.directCount + '・加盟' + g.franchiseCount
    : g.directCount > 0 ? '直営 ' + g.directCount + '店舗' : '加盟 ' + g.franchiseCount + '店舗';
  document.getElementById('detailBadge').textContent = badgeTxt;
  document.getElementById('detailBadge').className = 'detail-badge ' + badgeCls;

  document.getElementById('detailKpis').innerHTML =
    '<div class="detail-kpi"><div class="detail-kpi-val">' + fmtYenFull(g.totTarget) + '</div><div class="detail-kpi-lbl">目標</div></div>'
    + '<div class="detail-kpi"><div class="detail-kpi-val" style="color:var(--' + (achClass(g.achP) === 'good' ? 'good' : achClass(g.achP) === 'warn' ? 'warn' : 'bad') + ')">' + fmtYenFull(g.totActual) + '</div><div class="detail-kpi-lbl">実績</div></div>'
    + '<div class="detail-kpi"><div class="detail-kpi-val" style="color:var(--' + (achClass(g.achP) === 'good' ? 'good' : achClass(g.achP) === 'warn' ? 'warn' : 'bad') + ')">' + g.achP + '%</div><div class="detail-kpi-lbl">達成率</div></div>';

  var stores = g.stores.slice().sort(function(a, b) { return b.actual - a.actual; });
  document.getElementById('storeBody').innerHTML = stores.map(function(s, i) {
    var cls = achClass(s.achP);
    var rk  = i < 3 ? '<span class="td-rank g' + (i+1) + '">' + rankIcon(i) + '</span>'
                     : '<span class="td-rank">' + (i+1) + '</span>';
    var barW = Math.min(s.achP, 100);
    return '<tr>'
      + '<td>' + rk + '</td>'
      + '<td class="td-store"><div>' + s.store + '</div></td>'
      + '<td><span class="type-badge ' + (s.isDirect ? 'type-direct' : 'type-franchise') + '">' + (s.isDirect ? '直営' : '加盟') + '</span></td>'
      + '<td class="td-num target">' + fmtYenFull(s.target) + '</td>'
      + '<td class="td-num actual">' + fmtYenFull(s.actual) + '</td>'
      + '<td><span class="ach-pill ' + cls + '">' + s.achP + '%</span></td>'
      + '<td><div class="mini-bar-track"><div class="mini-bar-fill ' + cls + '" style="width:' + barW + '%"></div></div></td>'
      + '<td class="td-num landing-val">' + (s.landing > 0 ? fmtYenFull(s.landing) : '-') + '</td>'
      + '</tr>';
  }).join('');

  document.getElementById('detail-section').classList.remove('hide');
  document.getElementById('detail-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ====== アラート ======
function renderAlerts() {
  var danger  = _allStores.filter(function(s) { return s.achP < 50 && s.target > 0; })
                .sort(function(a, b) { return a.achP - b.achP; }).slice(0, 8);
  var success = _allStores.filter(function(s) { return s.achP >= 100; })
                .sort(function(a, b) { return b.achP - a.achP; }).slice(0, 8);

  document.getElementById('alertGrid').innerHTML =
    '<div class="alert-box danger">'
    + '<div class="alert-hd danger">🔴 要フォロー（達成率50%未満）  ' + danger.length + '店舗</div>'
    + (danger.length === 0 ? '<div style="font-size:12px;color:var(--text3)">該当店舗なし 🎉</div>' :
      danger.map(function(s) {
        return '<div class="alert-item">'
          + '<div class="alert-store">' + s.store + '<small>' + s.sv + '</small></div>'
          + '<div class="alert-pct danger">' + s.achP + '%</div>'
          + '</div>';
      }).join(''))
    + '</div>'
    + '<div class="alert-box success">'
    + '<div class="alert-hd success">🟢 目標達成！（100%以上）  ' + success.length + '店舗</div>'
    + (success.length === 0 ? '<div style="font-size:12px;color:var(--text3)">まだ達成店舗なし</div>' :
      success.map(function(s) {
        return '<div class="alert-item">'
          + '<div class="alert-store">' + s.store + '<small>' + s.sv + '</small></div>'
          + '<div class="alert-pct success">' + s.achP + '%</div>'
          + '</div>';
      }).join(''))
    + '</div>';
}

// ====== 全店一覧 ======
function renderAllStores() {
  var sorted = _allStores.slice().sort(function(a, b) { return b.achP - a.achP; });
  document.getElementById('allBody').innerHTML = sorted.map(function(s, i) {
    var cls = achClass(s.achP);
    var barW = Math.min(s.achP, 100);
    return '<tr data-store="' + s.store + '" data-sv="' + s.sv + '">'
      + '<td class="td-rank">' + (i + 1) + '</td>'
      + '<td style="font-size:11px;color:var(--text2)">' + s.sv + '</td>'
      + '<td class="td-store">' + s.store + '</td>'
      + '<td><span class="type-badge ' + (s.isDirect ? 'type-direct' : 'type-franchise') + '">' + (s.isDirect ? '直営' : '加盟') + '</span></td>'
      + '<td class="td-num target">' + fmtYenFull(s.target) + '</td>'
      + '<td class="td-num actual">' + fmtYenFull(s.actual) + '</td>'
      + '<td><span class="ach-pill ' + cls + '">' + s.achP + '%</span></td>'
      + '<td><div class="mini-bar-track"><div class="mini-bar-fill ' + cls + '" style="width:' + barW + '%"></div></div></td>'
      + '<td class="td-num landing-val">' + (s.landing > 0 ? fmtYenFull(s.landing) : '-') + '</td>'
      + '</tr>';
  }).join('');
}

function filterAll() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#allBody tr').forEach(function(tr) {
    var storeName = (tr.dataset.store || '').toLowerCase();
    var svName    = (tr.dataset.sv    || '').toLowerCase();
    tr.style.display = (storeName.includes(q) || svName.includes(q)) ? '' : 'none';
  });
}

function toggleAllStores() {
  _allExpanded = !_allExpanded;
  document.getElementById('allStoresWrap').classList.toggle('hide', !_allExpanded);
  document.getElementById('allToggleBtn').textContent = _allExpanded ? '▲ 折りたたむ' : '▼ 展開';
}

// ====== 自動更新 ======
setInterval(function() { loadData(); }, 30 * 60 * 1000); // 30分ごと

// ====== 起動 ======
loadData();
</script>
</body>
</html>
